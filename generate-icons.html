<!-- 
  Icon Generator for InstaAudio
  Open this file in a browser, right-click each canvas → "Save image as" 
  to create icon-16.png, icon-48.png, icon-128.png
-->
<!doctype html>
<html>
<head><meta charset="utf-8"><title>InstaAudio Icon Generator</title></head>
<body style="background:#222;color:#fff;font-family:system-ui;padding:40px;text-align:center">
  <h2>InstaAudio Icon Generator</h2>
  <p>Right-click each image → <b>Save image as...</b> → save to your extension folder</p>
  <div style="display:flex;gap:40px;justify-content:center;margin-top:30px;flex-wrap:wrap">
    <div>
      <canvas id="c128" width="128" height="128"></canvas>
      <p>icon-128.png</p>
    </div>
    <div>
      <canvas id="c48" width="48" height="48"></canvas>
      <p>icon-48.png</p>
    </div>
    <div>
      <canvas id="c16" width="16" height="16"></canvas>
      <p>icon-16.png</p>
    </div>
  </div>
  <script>
    function drawIcon(canvas) {
      const s = canvas.width;
      const ctx = canvas.getContext("2d");

      // Background: rounded square with gradient
      const r = s * 0.22;
      const grad = ctx.createLinearGradient(0, 0, s, s);
      grad.addColorStop(0, "#0095f6");
      grad.addColorStop(1, "#833ab4");

      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(s - r, 0);
      ctx.quadraticCurveTo(s, 0, s, r);
      ctx.lineTo(s, s - r);
      ctx.quadraticCurveTo(s, s, s - r, s);
      ctx.lineTo(r, s);
      ctx.quadraticCurveTo(0, s, 0, s - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Microphone icon
      ctx.save();
      ctx.translate(s / 2, s / 2);
      const u = s / 128; // unit scale

      // Mic body (rounded rect)
      const mw = 26 * u, mh = 42 * u, mr = 13 * u;
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.moveTo(-mw / 2 + mr, -mh / 2 - 8 * u);
      ctx.lineTo(mw / 2 - mr, -mh / 2 - 8 * u);
      ctx.quadraticCurveTo(mw / 2, -mh / 2 - 8 * u, mw / 2, -mh / 2 + mr - 8 * u);
      ctx.lineTo(mw / 2, mh / 2 - 8 * u);
      ctx.quadraticCurveTo(mw / 2, mh / 2 + mr - 8 * u, mw / 2 - mr, mh / 2 + mr - 8 * u);
      ctx.lineTo(-mw / 2 + mr, mh / 2 + mr - 8 * u);
      ctx.quadraticCurveTo(-mw / 2, mh / 2 + mr - 8 * u, -mw / 2, mh / 2 - 8 * u);
      ctx.lineTo(-mw / 2, -mh / 2 + mr - 8 * u);
      ctx.quadraticCurveTo(-mw / 2, -mh / 2 - 8 * u, -mw / 2 + mr, -mh / 2 - 8 * u);
      ctx.closePath();
      ctx.fill();

      // Arc around mic
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 4 * u;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.arc(0, -2 * u, 22 * u, 0.15 * Math.PI, 0.85 * Math.PI);
      ctx.stroke();

      // Stem
      ctx.beginPath();
      ctx.moveTo(0, 22 * u);
      ctx.lineTo(0, 36 * u);
      ctx.stroke();

      // Base
      ctx.beginPath();
      ctx.moveTo(-14 * u, 36 * u);
      ctx.lineTo(14 * u, 36 * u);
      ctx.stroke();

      // Download arrow (small, bottom-right)
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.strokeStyle = "rgba(255,255,255,0.9)";
      ctx.lineWidth = 3 * u;
      const ax = 28 * u, ay = 28 * u;
      ctx.beginPath();
      ctx.moveTo(ax, ay - 12 * u);
      ctx.lineTo(ax, ay + 2 * u);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ax - 7 * u, ay - 3 * u);
      ctx.lineTo(ax, ay + 4 * u);
      ctx.lineTo(ax + 7 * u, ay - 3 * u);
      ctx.stroke();

      ctx.restore();
    }

    drawIcon(document.getElementById("c128"));
    drawIcon(document.getElementById("c48"));
    drawIcon(document.getElementById("c16"));
  </script>
</body>
</html>
