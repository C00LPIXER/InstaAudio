<!-- 
  Icon Generator for InstaAudio
  Open this file in a browser, right-click each canvas → "Save image as" 
  to create icon-16.png, icon-48.png, icon-128.png
-->
<!doctype html>
<html>
<head><meta charset="utf-8"><title>InstaAudio Icon Generator</title></head>
<body style="background:#222;color:#fff;font-family:system-ui;padding:40px;text-align:center">
  <h2>InstaAudio Icon Generator</h2>
  <p>Right-click each image → <b>Save image as...</b> → save to your extension folder</p>
  <div style="display:flex;gap:40px;justify-content:center;margin-top:30px;flex-wrap:wrap">
    <div>
      <canvas id="c128" width="128" height="128"></canvas>
      <p>icon-128.png</p>
    </div>
    <div>
      <canvas id="c48" width="48" height="48"></canvas>
      <p>icon-48.png</p>
    </div>
    <div>
      <canvas id="c16" width="16" height="16"></canvas>
      <p>icon-16.png</p>
    </div>
  </div>
  <script src="generate-icons.js"></script>
</body>
</html>
